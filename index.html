<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Aprendendo a Aprender</title>
    <meta
      name="description"
      content="Página de técnicas de aprendizagem, com base no curso 'Aprendendo a Aprender' da Coursera."
    />
    <meta name="keywords" content="aprendizagem, técnicas, Coursera" />
    <meta name="robots" content="index, follow" />
    <link rel="stylesheet" href="../styles/page.css" />
    <meta name="author" content="Michael Ribeiro" />

  <body>
    <div class="page">
      <header class="header">
        <div class="header__content">
          <img
            src="images/TripletenLogo.svg"
            class="header__logo"
            alt="Logo da tripleten"
          />
          <h1 class="header__title">Aprendendo a Aprender</h1>
          <div class="header__footer">
            <p class="header__text">

            </p>
            <a href="#" class="header__link">Saiba mais 🡒</a>
          </div>
        </div>
        <div class="header__image">
          <div class="header__square-pic rotation"></div>
          <img
            src="images/on_the_edge.png"
            class="header__image-img"
            alt="Imagem de uma pessoa na pedra"
          />
        </div>
      </header>
    </div>
